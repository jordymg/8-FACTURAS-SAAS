name: Keep-alive

# Render free tier duerme el servicio tras ~15 min sin tráfico entrante
# (cold start ~30s). Este cron le pega a /health para que nunca llegue a
# dormirse. GitHub Actions NO ejecuta schedule con precisión sub-horaria
# (gaps reales observados de ~100 min con */14, ver Issue #007) — */10 es
# un margen mayor, decidido por el CEO, pero no una garantía. Ver
# docs/decisions/0013-keep-alive-render-free.md.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl --fail --max-time 60 https://facturas-saas.onrender.com/health || true
