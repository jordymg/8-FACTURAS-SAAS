services:
  - type: web
    name: facturas-saas
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SA_CREDENTIALS_JSON
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: facturas-db
          property: connectionString

databases:
  - name: facturas-db
    plan: free
