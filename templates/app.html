{% extends "base.html" %}
{% block title %}Facturas{% endblock %}
{% block body %}

<header class="app-header">
  <span class="app-title">Facturas</span>
  <div style="display:flex;align-items:center;gap:1rem">
    <a href="{{ url_for('web.config_view') }}" class="btn-ghost" style="text-decoration:none;font-size:.85rem;padding:.4rem .75rem">Configuración</a>
    <form action="{{ url_for('auth.logout') }}" method="post" style="display:inline">
      <button type="submit" class="btn-ghost">Salir</button>
    </form>
  </div>
</header>

<!-- Screen: capture / home -->
<main id="screen-capture" class="screen active">
  <label class="zona" id="zona" for="input-archivos">
    <p><strong>Arrastrá los archivos acá</strong></p>
    <p>o hacé click para elegirlos (o sacar una foto)</p>
    <p class="zona-formatos">JPG · PNG · WEBP · PDF</p>
    <input type="file" id="input-archivos" multiple accept="image/jpeg,image/png,image/webp,application/pdf" hidden>
  </label>

  <ul id="lista-archivos" class="lista-archivos"></ul>
  <button class="btn btn-primary" id="btn-procesar" style="width:100%;margin-top:.6rem" disabled>Procesar con IA</button>
  <p id="cargando" class="status-msg hidden">Extrayendo datos con IA, puede tardar unos segundos…</p>

  <section class="invoice-section">
    <h2 class="section-title">Últimas facturas</h2>
    <div id="invoice-list" class="invoice-list">
      <p class="list-placeholder">Cargando…</p>
    </div>
  </section>
</main>

<!-- Screen: review / edit (una card por comprobante) -->
<main id="screen-review" class="screen hidden">
  <div id="cards"></div>
  <button type="button" id="btn-volver" class="btn btn-ghost" style="width:100%;margin-top:1rem">Volver</button>
</main>

<script>
  window.__STRINGS__ = {{ strings | tojson }};
  window.__CAMPOS__ = {{ campos_json | safe }};
</script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js");
  }
</script>
{% endblock %}
